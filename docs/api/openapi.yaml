openapi: 3.1.0
info:
  title: CIS 5500 Housing Search API
  version: 0.1.0
  description: |
    Draft API spec for Milestone 4 (Apr. 20). Course requires:
    - One PDF upload to Gradescope with route list + params + responses (this file can be exported to PDF).
    - Routes aligned with your ≥10 SQL queries from Milestone 3; complex queries mapped to heavier endpoints.
    - Mentor check-in: backend testable (e.g. Swagger `/docs` or curl).

servers:
  - url: http://127.0.0.1:8000
    description: Local FastAPI

paths:
  /health:
    get:
      summary: Liveness probe (no DB)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/properties/search:
    get:
      summary: Search listings with filters (main Expedia-style results)
      parameters:
        - name: min_price
          in: query
          schema: { type: number, minimum: 0 }
          required: false
        - name: max_price
          in: query
          schema: { type: number, minimum: 0 }
        - name: min_income
          in: query
          schema: { type: number }
          description: Lower bound on neighborhood / tract income
        - name: max_income
          in: query
          schema: { type: number }
        - name: school_rating_min
          in: query
          schema: { type: number, minimum: 0, maximum: 10 }
        - name: neighborhood
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Paginated property cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertySearchResponse"

  /api/properties/{property_id}:
    get:
      summary: Single listing detail (second page / drill-down)
      parameters:
        - name: property_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyCard"
        "404":
          description: Not found

  /api/meta/price-histogram:
    get:
      summary: Buckets for price filter UI
      responses:
        "200":
          description: Histogram bins

  /api/meta/neighborhoods:
    get:
      summary: Facet counts for neighborhood radio list
      responses:
        "200":
          description: Neighborhood options

components:
  schemas:
    PropertyCard:
      type: object
      required: [id, address_line]
      properties:
        id: { type: string }
        address_line: { type: string }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        list_price: { type: number, nullable: true }
        median_income_band: { type: string, nullable: true }
        school_rating: { type: number, nullable: true }
        bedrooms: { type: number, nullable: true }
        bathrooms: { type: number, nullable: true }
        sqft: { type: number, nullable: true }
        thumb_url: { type: string, nullable: true }

    PropertySearchResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PropertyCard"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
